spring.application.name=BuildSmart

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/buildsmart?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Optional: Use legacy datetime code for Java 8+ compatibility
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT (required by IAM module)
jwt.secret=BuildSmartJwtSecretKeyForDevelopmentOnlyMustBeAtLeast256BitsLongForHS256
jwt.expiration=86400000
